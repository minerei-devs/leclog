name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.2.3"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        default: ""
        type: string
      draft:
        description: "Create the release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    runs-on: macos-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            draft="${{ inputs.draft }}"
          else
            tag="${GITHUB_REF_NAME}"
            release_name=""
            draft="false"
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="Leclog ${tag}"
          fi

          if [[ "${tag}" == *-* ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "draft=${draft}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Validate release version
        shell: bash
        run: |
          tag_version="${{ steps.meta.outputs.tag }}"
          tag_version="${tag_version#v}"

          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"
          cargo_version="$(awk -F'\"' '/^version = \"/ { print $2; exit }' src-tauri/Cargo.toml)"

          if [[ "$package_version" != "$tag_version" || "$tauri_version" != "$tag_version" || "$cargo_version" != "$tag_version" ]]; then
            echo "Release tag does not match versioned files." >&2
            echo "tag: ${tag_version}" >&2
            echo "package.json: ${package_version}" >&2
            echo "src-tauri/tauri.conf.json: ${tauri_version}" >&2
            echo "src-tauri/Cargo.toml: ${cargo_version}" >&2
            exit 1
          fi

      - name: Validate macOS signing secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=()

          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_KEY \
            APPLE_API_ISSUER \
            APPLE_API_KEY_P8 \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [[ -z "${!key}" ]]; then
              missing+=("${key}")
            fi
          done

          if ((${#missing[@]} > 0)); then
            echo "Missing required GitHub secrets for signed and notarized macOS releases: ${missing[*]}" >&2
            exit 1
          fi

      - name: Write App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${APPLE_API_KEY_P8}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "APPLE_API_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseCommitish: ${{ github.sha }}
          releaseDraft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generateReleaseNotes: true

      - name: Re-sign final updater asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          work_dir="${RUNNER_TEMP}/updater-signature"
          rm -rf "${work_dir}"
          mkdir -p "${work_dir}"

          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "Leclog_aarch64.app.tar.gz" \
            --dir "${work_dir}"

          pnpm tauri signer sign "${work_dir}/Leclog_aarch64.app.tar.gz"

          RELEASE_TAG="${RELEASE_TAG}" \
          GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
          SIGNATURE_PATH="${work_dir}/Leclog_aarch64.app.tar.gz.sig" \
          node <<'NODE'
          const fs = require("fs");

          const tag = process.env.RELEASE_TAG;
          const version = tag.replace(/^v/, "");
          const signature = fs.readFileSync(process.env.SIGNATURE_PATH, "utf8").trim();
          const url = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${tag}/Leclog_aarch64.app.tar.gz`;
          const manifest = {
            version,
            notes: "",
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-aarch64": { signature, url },
              "darwin-aarch64-app": { signature, url },
            },
          };

          fs.writeFileSync("latest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          gh release upload "${RELEASE_TAG}" \
            "${work_dir}/Leclog_aarch64.app.tar.gz.sig" \
            latest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
