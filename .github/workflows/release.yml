name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.2.3"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        default: ""
        type: string
      draft:
        description: "Create the release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    runs-on: macos-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WHISPER_CPP_TAG: v1.8.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            draft="${{ inputs.draft }}"
          else
            tag="${GITHUB_REF_NAME}"
            release_name=""
            draft="false"
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="Leclog ${tag}"
          fi

          if [[ "${tag}" == *-* ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "draft=${draft}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Validate release version
        shell: bash
        run: |
          tag_version="${{ steps.meta.outputs.tag }}"
          tag_version="${tag_version#v}"

          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"
          cargo_version="$(awk -F'\"' '/^version = \"/ { print $2; exit }' src-tauri/Cargo.toml)"

          if [[ "$package_version" != "$tag_version" || "$tauri_version" != "$tag_version" || "$cargo_version" != "$tag_version" ]]; then
            echo "Release tag does not match versioned files." >&2
            echo "tag: ${tag_version}" >&2
            echo "package.json: ${package_version}" >&2
            echo "src-tauri/tauri.conf.json: ${tauri_version}" >&2
            echo "src-tauri/Cargo.toml: ${cargo_version}" >&2
            exit 1
          fi

      - name: Validate macOS signing secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=()

          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_KEY \
            APPLE_API_ISSUER \
            APPLE_API_KEY_P8 \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [[ -z "${!key}" ]]; then
              missing+=("${key}")
            fi
          done

          if ((${#missing[@]} > 0)); then
            echo "Missing required GitHub secrets for signed and notarized macOS releases: ${missing[*]}" >&2
            exit 1
          fi

      - name: Write App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${APPLE_API_KEY_P8}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "APPLE_API_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Build and stage whisper runtime
        shell: bash
        run: |
          set -euo pipefail

          work_dir="${RUNNER_TEMP}/whisper-runtime"
          artifact_dir="${RUNNER_TEMP}/whisper-runtime-artifacts"
          rm -rf "${work_dir}" "${artifact_dir}"
          mkdir -p "${work_dir}" "${artifact_dir}"

          git clone \
            --depth 1 \
            --branch "${WHISPER_CPP_TAG}" \
            https://github.com/ggml-org/whisper.cpp.git \
            "${work_dir}/whisper.cpp"

          cmake \
            -S "${work_dir}/whisper.cpp" \
            -B "${work_dir}/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF

          cmake \
            --build "${work_dir}/build" \
            --config Release \
            --target whisper-cli \
            --parallel "$(sysctl -n hw.ncpu)"

          runtime_asset="${artifact_dir}/whisper-cli-aarch64-apple-darwin"
          cp "${work_dir}/build/bin/whisper-cli" "${runtime_asset}"
          chmod 755 "${runtime_asset}"

          otool -L "${runtime_asset}" | tee "${artifact_dir}/whisper-cli-aarch64-apple-darwin.otool.txt"
          if grep -E '/opt/homebrew|@rpath/libwhisper|@rpath/libggml' "${artifact_dir}/whisper-cli-aarch64-apple-darwin.otool.txt"; then
            echo "whisper-cli has non-system dynamic dependencies; build a self-contained runtime before release." >&2
            exit 1
          fi

          (
            cd "${artifact_dir}"
            shasum -a 256 whisper-cli-aarch64-apple-darwin > whisper-cli-aarch64-apple-darwin.sha256
          )

          cp "${runtime_asset}" "src-tauri/binaries/whisper-cli-aarch64-apple-darwin"

          node <<'NODE'
          const fs = require("fs");

          const configPath = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
          const externalBin = new Set(config.bundle.externalBin || []);
          externalBin.add("binaries/ffmpeg");
          externalBin.add("binaries/whisper-cli");
          config.bundle.externalBin = Array.from(externalBin);
          fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseCommitish: ${{ github.sha }}
          releaseDraft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generateReleaseNotes: true

      - name: Upload whisper runtime asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/whisper-runtime-artifacts"
          gh release upload "${RELEASE_TAG}" \
            "${artifact_dir}/whisper-cli-aarch64-apple-darwin" \
            "${artifact_dir}/whisper-cli-aarch64-apple-darwin.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Re-sign final updater asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          work_dir="${RUNNER_TEMP}/updater-signature"
          rm -rf "${work_dir}"
          mkdir -p "${work_dir}"

          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "Leclog_aarch64.app.tar.gz" \
            --dir "${work_dir}"

          pnpm tauri signer sign "${work_dir}/Leclog_aarch64.app.tar.gz"

          RELEASE_TAG="${RELEASE_TAG}" \
          GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
          SIGNATURE_PATH="${work_dir}/Leclog_aarch64.app.tar.gz.sig" \
          node <<'NODE'
          const fs = require("fs");

          const tag = process.env.RELEASE_TAG;
          const version = tag.replace(/^v/, "");
          const signature = fs.readFileSync(process.env.SIGNATURE_PATH, "utf8").trim();
          const url = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${tag}/Leclog_aarch64.app.tar.gz`;
          const manifest = {
            version,
            notes: "",
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-aarch64": { signature, url },
              "darwin-aarch64-app": { signature, url },
            },
          };

          fs.writeFileSync("latest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          gh release upload "${RELEASE_TAG}" \
            "${work_dir}/Leclog_aarch64.app.tar.gz.sig" \
            latest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  publish-windows:
    needs: publish-tauri
    runs-on: windows-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WHISPER_CPP_TAG: v1.8.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
            $releaseName = "${{ inputs.release_name }}"
            $draft = "${{ inputs.draft }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
            $releaseName = ""
            $draft = "false"
          }

          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            $releaseName = "Leclog $tag"
          }

          $prerelease = if ($tag.Contains("-")) { "true" } else { "false" }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Validate release version
        shell: pwsh
        run: |
          $tagVersion = "${{ steps.meta.outputs.tag }}" -replace "^v", ""
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version"
          $cargoVersion = Select-String -Path "src-tauri/Cargo.toml" -Pattern '^version = "(.+)"' |
            Select-Object -First 1 |
            ForEach-Object { $_.Matches[0].Groups[1].Value }

          if ($packageVersion -ne $tagVersion -or $tauriVersion -ne $tagVersion -or $cargoVersion -ne $tagVersion) {
            Write-Error "Release tag does not match versioned files. tag: $tagVersion, package.json: $packageVersion, src-tauri/tauri.conf.json: $tauriVersion, src-tauri/Cargo.toml: $cargoVersion"
            exit 1
          }

      - name: Build and stage Windows runtimes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $targetTriple = "x86_64-pc-windows-msvc"
          $workDir = Join-Path $env:RUNNER_TEMP "windows-runtime"
          $artifactDir = Join-Path $env:RUNNER_TEMP "windows-runtime-artifacts"
          Remove-Item -Recurse -Force $workDir, $artifactDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $workDir, $artifactDir | Out-Null

          $ffmpegZip = Join-Path $workDir "ffmpeg-release-essentials.zip"
          $ffmpegExtractDir = Join-Path $workDir "ffmpeg"
          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegExtractDir
          $ffmpegExe = Get-ChildItem -Path $ffmpegExtractDir -Recurse -Filter "ffmpeg.exe" |
            Select-Object -First 1
          if (-not $ffmpegExe) {
            throw "ffmpeg.exe was not found in the downloaded archive."
          }
          Copy-Item $ffmpegExe.FullName "src-tauri/binaries/ffmpeg-$targetTriple.exe"

          git clone `
            --depth 1 `
            --branch $env:WHISPER_CPP_TAG `
            https://github.com/ggml-org/whisper.cpp.git `
            "$workDir/whisper.cpp"

          cmake `
            -S "$workDir/whisper.cpp" `
            -B "$workDir/build" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_BUILD_SERVER=OFF

          cmake `
            --build "$workDir/build" `
            --config Release `
            --target whisper-cli `
            --parallel $env:NUMBER_OF_PROCESSORS

          $whisperExe = Get-ChildItem -Path "$workDir/build" -Recurse -Filter "whisper-cli.exe" |
            Select-Object -First 1
          if (-not $whisperExe) {
            throw "whisper-cli.exe was not found after building whisper.cpp."
          }

          $runtimeAsset = Join-Path $artifactDir "whisper-cli-$targetTriple.exe"
          Copy-Item $whisperExe.FullName $runtimeAsset
          Copy-Item $runtimeAsset "src-tauri/binaries/whisper-cli-$targetTriple.exe"

          $hash = (Get-FileHash -Algorithm SHA256 $runtimeAsset).Hash.ToLowerInvariant()
          "$hash  whisper-cli-$targetTriple.exe" |
            Set-Content -NoNewline -Path "$runtimeAsset.sha256"

          @'
          const fs = require("fs");

          const configPath = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
          const externalBin = new Set(config.bundle.externalBin || []);
          externalBin.add("binaries/ffmpeg");
          externalBin.add("binaries/whisper-cli");
          config.bundle.externalBin = Array.from(externalBin);
          config.bundle.targets = ["nsis"];
          fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          '@ | node

      - name: Build Windows app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"

          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $assets = Get-ChildItem -Path $bundleDir -File |
            Where-Object { $_.Name -ne "latest.json" } |
            ForEach-Object { $_.FullName }

          $artifactDir = Join-Path $env:RUNNER_TEMP "windows-runtime-artifacts"
          $assets += (Join-Path $artifactDir "whisper-cli-x86_64-pc-windows-msvc.exe")
          $assets += (Join-Path $artifactDir "whisper-cli-x86_64-pc-windows-msvc.exe.sha256")

          gh release upload $env:RELEASE_TAG $assets `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
